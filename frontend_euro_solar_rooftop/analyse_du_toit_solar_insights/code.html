<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- TopNavBar -->
<header class="bg-surface shadow-sm docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-margin-desktop max-w-container-max mx-auto h-20">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">solar_power</span>
<span class="font-headline-md text-headline-md font-bold text-on-surface">Solar Insights</span>
</div>
<nav class="hidden md:flex gap-8">
<a class="font-label-md text-label-md text-primary border-b-2 border-primary pb-1" href="#">Analysis</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Dashboard</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">EU Context</a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">About</a>
</nav>
<div class="flex items-center gap-4">
<button class="font-label-md text-label-md bg-primary-container text-on-primary-container px-6 py-3 rounded-full hover:bg-primary hover:text-on-primary transition-colors shadow-sm">
                    Find My Roof
                </button>
</div>
</div>
</header>
<!-- Main Content: Full Screen Split -->
<main class="flex-1 flex flex-col lg:flex-row w-full h-[calc(100vh-80px)]">
<!-- Left Side: Interactive Map (60%) -->
<section class="relative w-full lg:w-[60%] h-1/2 lg:h-full bg-surface-container-high border-r border-outline-variant overflow-hidden">

<div class="absolute top-margin-desktop left-margin-desktop flex flex-col gap-2">
<button aria-label="Zoom In" class="bg-surface text-on-surface p-2 rounded-lg shadow-md hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button aria-label="Zoom Out" class="bg-surface text-on-surface p-2 rounded-lg shadow-md hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
<!-- Status Chip on Map -->
<div class="absolute top-margin-desktop right-margin-desktop bg-secondary-container text-on-secondary-container px-4 py-2 rounded-full font-label-sm text-label-sm flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Potentiel Élevé
            </div>
</section>
<!-- Right Side: Sidebar (40%) -->
<section class="w-full lg:w-[40%] h-1/2 lg:h-full bg-surface overflow-y-auto p-margin-mobile lg:p-margin-desktop flex flex-col gap-gutter">
<div>
<h1 class="font-headline-lg text-headline-lg-mobile lg:text-headline-lg text-on-surface mb-2">Paramètres de votre toit</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Ajustez les détails pour affiner l'analyse de votre potentiel solaire.</p>
</div>
<!-- Inputs / Parameters -->
<div class="flex flex-col gap-4">
<!-- Surface -->
<div class="bg-surface-container-lowest rounded-xl p-4 widget-shadow border border-surface-variant input-focus-effect transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[18px]">straighten</span>

                    </label>
<div class="flex items-center">
<input class="w-full bg-transparent border-none font-body-lg text-body-lg text-on-surface focus:ring-0 p-0" type="number" value="45"/>
</div>
</div>
<!-- Inclinaison -->
<div class="bg-surface-container-lowest rounded-xl p-4 widget-shadow border border-surface-variant input-focus-effect transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[18px]">architecture</span>
                        Inclinaison du toit
                    </label>
<select class="w-full bg-transparent border-none font-body-lg text-body-lg text-on-surface focus:ring-0 p-0 cursor-pointer">
<option>30° (Standard)</option>
<option>15° (Faible)</option>
<option>45° (Forte)</option>
<option>Toit Plat</option>
</select>
</div>
<!-- Orientation -->
<div class="bg-surface-container-lowest rounded-xl p-4 widget-shadow border border-surface-variant input-focus-effect transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[18px]">explore</span>
                        Orientation
                    </label>
<div class="flex gap-2 mt-2">
<button class="flex-1 py-2 rounded-lg bg-surface-variant text-on-surface font-label-md text-label-md hover:bg-surface-container-high transition-colors">Est</button>
<button class="flex-1 py-2 rounded-lg bg-primary-container text-on-primary-container font-label-md text-label-md shadow-sm border border-primary">Sud</button>
<button class="flex-1 py-2 rounded-lg bg-surface-variant text-on-surface font-label-md text-label-md hover:bg-surface-container-high transition-colors">Ouest</button>
</div>
</div>
</div>

<div class="mt-4 bg-tertiary-fixed text-on-tertiary-fixed rounded-xl p-6 relative overflow-hidden">

<div class="absolute -right-4 -top-4 opacity-10">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">solar_power</span>
</div>
<h3 class="font-headline-md text-headline-md mb-6 relative z-10">Estimation du Système</h3>
<div class="flex justify-between items-center relative z-10">
<div>
<p class="font-label-sm text-label-sm text-on-tertiary-fixed-variant mb-1">Capacité estimée</p>
<p class="font-headline-lg text-headline-lg-mobile lg:text-headline-lg font-bold text-on-tertiary-fixed">8.2 <span class="font-body-md text-body-md">kWp</span></p>
</div>
<div class="h-12 w-px bg-on-tertiary-fixed opacity-20"></div>
<div>
<p class="font-label-sm text-label-sm text-on-tertiary-fixed-variant mb-1">Nombre de panneaux</p>
<p class="font-headline-lg text-headline-lg-mobile lg:text-headline-lg font-bold text-on-tertiary-fixed">20</p>
</div>
</div>
</div>

<div class="mt-auto pt-8">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-4 rounded-xl shadow-md hover:bg-primary hover:text-on-primary transition-colors flex justify-center items-center gap-2">
